# Nginx 反向代理 - 给 Chrome CDP 改写 Host 头
#
# 为什么需要这个: Chrome 111+ 对 DevTools HTTP 接口校验 Host 头,
# 非 localhost / 127.0.0.1 直接 500. 跨容器调用必须把 Host 改写成
# Chrome 接受的值. socat 是纯 TCP 不动 HTTP 头, 所以用 nginx.

worker_processes 1;
error_log  /dev/stderr  warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log off;

    # WebSocket upgrade: Playwright 连 CDP 是 WS
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 9222;

        location / {
            proxy_pass http://127.0.0.1:19222;

            # 关键: 改写 Host 头, Chrome 才不拒
            proxy_set_header Host "127.0.0.1:9222";

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # CDP 会话可能跑几个小时, 别让 nginx 中断
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
