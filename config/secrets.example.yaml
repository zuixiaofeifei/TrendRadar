# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 密钥配置(模板)
# ═══════════════════════════════════════════════════════════════
#
# 用法:
#   1. cp config/secrets.example.yaml config/secrets.yaml
#   2. 在 secrets.yaml 里填入真实密钥
#   3. secrets.yaml 已被 .gitignore,绝不会进 git
#   4. 部署后: chmod 600 config/secrets.yaml
#
# 字段集与 config.yaml 互斥:
#   - 此文件只放密钥/凭据/Webhook URL/邮箱地址等敏感字段
#   - 公开字段(model / smtp_server / ntfy.server_url / 模板等)留在 config.yaml
#
# 优先级:secrets.yaml 字段非空 > config.yaml 同字段 > 环境变量(fetcher 内部兜底)
# 空字符串视为"未设置",不会清空 config.yaml 同名字段
# ═══════════════════════════════════════════════════════════════


# ───────────────────────────────────────────────────────────────
# AI 模型 API Key
# ───────────────────────────────────────────────────────────────
ai:
  api_key: ""                              # DeepSeek / OpenAI / Gemini 等


# ───────────────────────────────────────────────────────────────
# 推送通道密钥
# 多账号: 分号(;)分隔,如 "url1;url2;url3"
# ───────────────────────────────────────────────────────────────
notification:
  channels:
    feishu:
      webhook_url: ""                      # 飞书机器人 webhook

    dingtalk:
      webhook_url: ""                      # 钉钉机器人 webhook

    wework:
      webhook_url: ""                      # 企业微信机器人 webhook

    telegram:
      bot_token: ""                        # Telegram Bot Token
      chat_id: ""                          # Telegram Chat ID

    email:
      from: ""                             # 发件邮箱地址
      password: ""                         # 邮箱授权码(不是登录密码!)
      to: ""                               # 收件邮箱(多个用逗号)

    ntfy:
      topic: ""                            # 主题名称(知道 topic 即可推送,视为半敏感)
      token: ""                            # 私有主题访问令牌

    bark:
      url: ""                              # 完整 URL,例:https://api.day.app/<device_key>

    slack:
      webhook_url: ""                      # Slack incoming webhook

    generic_webhook:
      webhook_url: ""                      # 通用 webhook


# ───────────────────────────────────────────────────────────────
# 关键词跨源检索
# ───────────────────────────────────────────────────────────────
keyword_search:
  sources:
    github:
      # GitHub Personal Access Token
      # 申请: https://github.com/settings/tokens
      # 权限: fine-grained PAT,只勾选 "Public Repositories" 读权限即可
      # 留空 → 走 60次/小时 未鉴权,有 token 则升到 5000/小时
      token: ""

    reddit:
      # Reddit OAuth 凭据(script 类型)
      # 申请: https://www.reddit.com/prefs/apps
      # 留空 → 公开 endpoint 现已被 Reddit 403 阻挡,几乎不可用
      client_id: ""
      client_secret: ""
      user_agent: ""                       # 例:"TrendRadar/2.0 (by /u/your-reddit-name)"


# ───────────────────────────────────────────────────────────────
# 远程对象存储(仅启用 S3 兼容后端时需要)
# ───────────────────────────────────────────────────────────────
storage:
  remote:
    endpoint_url: ""                       # 服务端点
                                           # R2:  https://<account_id>.r2.cloudflarestorage.com
                                           # OSS: https://oss-cn-hangzhou.aliyuncs.com
                                           # COS: https://cos.ap-guangzhou.myqcloud.com
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
